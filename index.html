<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TV Player</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

iframe {
    position: fixed;
    width: 180%;
    height: 180%;
    left: -40%;
    top: -40%;
    border: 0;
}
</style>
</head>

<body>

<iframe
    src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1"
    allowfullscreen>
</iframe>

</body>
</html>
