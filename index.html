<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

iframe{
    position:fixed;

    width:170%;
    height:170%;

    left:-35%;
    top:-35%;

    border:0;
}
</style>
</head>

<body>

<iframe id="player"></iframe>

<script>
const params = new URLSearchParams(location.search);
const v = params.get("v");

document.getElementById("player").src =
    "https://www.youtube.com/embed/" + v + "?autoplay=1";
</script>

</body>
</html>
